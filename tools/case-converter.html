<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Converter – EveryTool</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0f172a; color: white; font-family: Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        nav { width: 100%; background: #1e293b; padding: 14px 24px; }
        nav a { color: #94a3b8; text-decoration: none; font-size: 14px; }
        nav a:hover { color: white; }
        h1 { margin: 36px 0 24px; font-size: 22px; color: #e2e8f0; }
        .container { width: 100%; max-width: 640px; padding: 0 16px 48px; display: flex; flex-direction: column; gap: 16px; }
        textarea { width: 100%; height: 180px; background: #1e293b; border: 1px solid #334155; border-radius: 12px; color: #f1f5f9; font-size: 15px; line-height: 1.6; padding: 16px; resize: vertical; outline: none; transition: border-color 0.2s; }
        textarea::placeholder { color: #475569; }
        textarea:focus { border-color: #3b82f6; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        button { padding: 14px 0; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; transition: background 0.15s; }
        .btn-case { background: #1d4ed8; color: white; }
        .btn-case:hover { background: #2563eb; }
        .btn-clear { background: #334155; color: #94a3b8; }
        .btn-clear:hover { background: #475569; color: white; }
        .btn-copy { background: #15803d; color: white; }
        .btn-copy:hover { background: #16a34a; }
        .row { display: flex; gap: 10px; }
        .row button { flex: 1; }
    </style>
</head>
<body>
<nav><a href="../index.html">← Back to EveryTool</a></nav>
<h1>🔤 Case Converter</h1>
<div class="container">
    <textarea id="input" placeholder="Enter your text here..."></textarea>
    <div class="btn-grid">
        <button class="btn-case" onclick="convert('upper')">UPPER CASE</button>
        <button class="btn-case" onclick="convert('lower')">lower case</button>
        <button class="btn-case" onclick="convert('title')">Title Case</button>
        <button class="btn-case" onclick="convert('sentence')">Sentence case</button>
        <button class="btn-case" onclick="convert('camel')">camelCase</button>
        <button class="btn-case" onclick="convert('snake')">snake_case</button>
        <button class="btn-case" onclick="convert('kebab')">kebab-case</button>
        <button class="btn-case" onclick="convert('pascal')">PascalCase</button>
        <button class="btn-case" onclick="convert('alternate')">aLtErNaTe</button>
    </div>
    <div class="row">
        <button class="btn-clear" onclick="document.getElementById('input').value=''">Clear</button>
        <button class="btn-copy" onclick="copyText()">Copy</button>
    </div>
</div>
<script>
    function convert(type) {
        const el = document.getElementById('input');
        let t = el.value;
        if (!t) return;
        switch(type) {
            case 'upper': el.value = t.toUpperCase(); break;
            case 'lower': el.value = t.toLowerCase(); break;
            case 'title': el.value = t.toLowerCase().replace(/\b\w/g, c => c.toUpperCase()); break;
            case 'sentence': el.value = t.toLowerCase().replace(/(^\s*\w|[.!?]\s*\w)/g, c => c.toUpperCase()); break;
            case 'camel':
                el.value = t.toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g, (_, c) => c.toUpperCase()); break;
            case 'snake': el.value = t.trim().toLowerCase().replace(/\s+/g, '_'); break;
            case 'kebab': el.value = t.trim().toLowerCase().replace(/\s+/g, '-'); break;
            case 'pascal':
                el.value = t.toLowerCase().replace(/(?:^|\s|[^a-zA-Z0-9])(\w)/g, (_, c) => c.toUpperCase()).replace(/\s+/g, ''); break;
            case 'alternate':
                el.value = t.split('').map((c, i) => i % 2 === 0 ? c.toLowerCase() : c.toUpperCase()).join(''); break;
        }
    }
    function copyText() {
        const val = document.getElementById('input').value;
        navigator.clipboard.writeText(val).then(() => {
            const btn = document.querySelector('.btn-copy');
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy', 1500);
        });
    }
</script>
</body>
</html>
HTMLEOF
echo "case-converter.html done"
