<h1>📄 Lorem Ipsum Generator</h1>
<div class="container">
    <div class="controls">
        <div class="ctrl-group">
            <label>Type</label>
            <select id="genType">
                <option value="paragraphs">Paragraphs</option>
                <option value="sentences">Sentences</option>
                <option value="words">Words</option>
            </select>
        </div>
        <div class="ctrl-group">
            <label>Amount</label>
            <input type="number" id="amount" value="3" min="1" max="50">
        </div>
        <button class="btn-gen" onclick="generate()">Generate</button>
    </div>
    <textarea id="output" readonly placeholder="Click Generate to create Lorem Ipsum text..."></textarea>
    <button class="btn-copy" onclick="copyText()">Copy</button>
</div>
<script>
const words = ["lorem","ipsum","dolor","sit","amet","consectetur","adipiscing","elit","sed","do","eiusmod","tempor","incididunt","ut","labore","et","dolore","magna","aliqua","enim","ad","minim","veniam","quis","nostrud","exercitation","ullamco","laboris","nisi","aliquip","ex","ea","commodo","consequat","duis","aute","irure","in","reprehenderit","voluptate","velit","esse","cillum","eu","fugiat","nulla","pariatur","excepteur","sint","occaecat","cupidatat","non","proident","sunt","culpa","qui","officia","deserunt","mollit","anim","id","est","laborum","curabitur","pretium","tincidunt","lacus","nunc","purus","accumsan","libero","vitae","diam","posuere","porttitor","at","varius","vel","pharetra","mi","nullam","feugiat","viverra","scelerisque","pulvinar","mattis","egestas","urna","augue","interdum","velit","laoreet","id","donec","ultrices","tincidunt","arcu"];
function rnd(n) { return Math.floor(Math.random()*n); }
function sentence() {
    const len = 8 + rnd(10);
    let w = [];
    for(let i=0;i<len;i++) w.push(words[rnd(words.length)]);
    w[0] = w[0].charAt(0).toUpperCase() + w[0].slice(1);
    return w.join(' ') + '.';
}
function paragraph() {
    const sents = 4 + rnd(4);
    let s = [];
    for(let i=0;i<sents;i++) s.push(sentence());
    return s.join(' ');
}
function generate() {
    const type = document.getElementById('genType').value;
    const amt = parseInt(document.getElementById('amount').value) || 3;
    let result = '';
    if(type === 'paragraphs') {
        let ps = [];
        for(let i=0;i<amt;i++) ps.push(paragraph());
        result = ps.join('\n\n');
    } else if(type === 'sentences') {
        let ss = [];
        for(let i=0;i<amt;i++) ss.push(sentence());
        result = ss.join(' ');
    } else {
        let ws = [];
        for(let i=0;i<amt;i++) ws.push(words[rnd(words.length)]);
        ws[0] = ws[0].charAt(0).toUpperCase() + ws[0].slice(1);
        result = ws.join(' ') + '.';
    }
    document.getElementById('output').value = result;
}
function copyText() {
    navigator.clipboard.writeText(document.getElementById('output').value).then(() => {
        const btn = document.querySelector('.btn-copy');
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 1500);
    });
}
generate();
</script>
</body>
