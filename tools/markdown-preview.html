cat > /mnt/user-data/outputs/tools/markdown-preview.html << 'HTMLEOF'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Preview – EveryTool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0f172a; color: white; font-family: Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
        nav { width: 100%; background: #1e293b; padding: 14px 24px; flex-shrink: 0; }
        nav a { color: #94a3b8; text-decoration: none; font-size: 14px; }
        nav a:hover { color: white; }
        h1 { text-align: center; margin: 24px 0; font-size: 22px; color: #e2e8f0; flex-shrink: 0; }
        .editor { display: grid; grid-template-columns: 1fr 1fr; gap: 0; flex: 1; height: calc(100vh - 110px); }
        .pane { display: flex; flex-direction: column; }
        .pane-label { background: #1e293b; padding: 10px 16px; font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #334155; }
        .pane:first-child .pane-label { border-right: 1px solid #334155; }
        textarea { flex: 1; background: #0f172a; border: none; border-right: 1px solid #334155; color: #f1f5f9; font-size: 14px; line-height: 1.7; padding: 20px; resize: none; outline: none; font-family: 'Courier New', monospace; }
        .preview { flex: 1; background: #0f172a; padding: 20px; overflow-y: auto; line-height: 1.7; font-size: 15px; }
        .preview h1,.preview h2,.preview h3,.preview h4 { color: #e2e8f0; margin: 16px 0 8px; }
        .preview p { color: #cbd5e1; margin-bottom: 12px; }
        .preview code { background: #1e293b; padding: 2px 6px; border-radius: 4px; font-family: monospace; color: #60a5fa; font-size: 13px; }
        .preview pre { background: #1e293b; padding: 16px; border-radius: 8px; overflow-x: auto; margin-bottom: 12px; }
        .preview pre code { background: none; padding: 0; color: #a5f3fc; }
        .preview blockquote { border-left: 3px solid #3b82f6; padding-left: 16px; color: #94a3b8; margin-bottom: 12px; }
        .preview ul,.preview ol { padding-left: 24px; color: #cbd5e1; margin-bottom: 12px; }
        .preview a { color: #60a5fa; }
        .preview hr { border: none; border-top: 1px solid #334155; margin: 16px 0; }
        .preview table { border-collapse: collapse; width: 100%; margin-bottom: 12px; }
        .preview th,.preview td { border: 1px solid #334155; padding: 8px 12px; color: #cbd5e1; }
        .preview th { background: #1e293b; color: #e2e8f0; }
        @media(max-width:600px) { .editor { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<nav><a href="../index.html">← Back to EveryTool</a></nav>
<h1>📝 Markdown Preview</h1>
<div class="editor">
    <div class="pane">
        <div class="pane-label">✏️ Markdown</div>
        <textarea id="input" oninput="render()" placeholder="Type markdown here...">## Hello, Markdown!

This is a **bold** and *italic* example.

- Item one
- Item two
- Item three

\`\`\`js
console.log("Hello World");
\`\`\`

> Blockquote example

[Link](https://example.com)</textarea>
    </div>
    <div class="pane">
        <div class="pane-label">👁️ Preview</div>
        <div class="preview" id="preview"></div>
    </div>
</div>
<script>
    function render() {
        const md = document.getElementById('input').value;
        document.getElementById('preview').innerHTML = marked.parse(md);
    }
    render();
</script>
</body>
</html>
HTMLEOF
echo "markdown-preview done"
